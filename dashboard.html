<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Library Management System</title>
<link rel="stylesheet" href="stylee.css">
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Library</h2>

<ul>
<li onclick="showPage('dashboardPage')">Dashboard</li>
<li onclick="showPage('inventoryPage')">Inventory</li>
<li onclick="showPage('borrowPage')">Borrow Book</li>
<li onclick="showPage('recordsPage')">Borrow Records</li>
</ul>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboardPage" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Books</h3>
<p id="totalBooks">0</p>
</div>

<div class="card">
<h3>Available</h3>
<p id="availableBooks">0</p>
</div>

<div class="card">
<h3>Borrowed</h3>
<p id="borrowedBooks">0</p>
</div>

<div class="card">
<h3>Overdue</h3>
<p id="overdueBooks">0</p>
</div>

</div>

</div>

<!-- INVENTORY -->

<div id="inventoryPage" class="page" style="display:none">

<h2>Add Book</h2>

<form id="bookForm">

<input type="text" id="bookName" placeholder="Book Name" required>

<input type="text" id="author" placeholder="Author" required>

<input type="number" id="quantity" placeholder="Number of Copies" required>

<button type="submit">Add Book</button>

</form>

<h2>Inventory</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Author</th>
<th>Available</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookTable"></tbody>

</table>

</div>

<!-- BORROW -->

<div id="borrowPage" class="page" style="display:none">

<h2>Borrow Book</h2>

<input type="number" id="borrowBookID" placeholder="Book ID">

<input type="text" id="borrowerName" placeholder="Borrower Name">

<input type="date" id="dueDate">

<button onclick="borrowBook()">Borrow</button>

</div>

<!-- RECORDS -->

<div id="recordsPage" class="page" style="display:none">

<h2>Borrow Records</h2>

<table>

<thead>
<tr>
<th>Borrower</th>
<th>Book</th>
<th>Due Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="borrowTable"></tbody>

</table>

</div>

</div>

</div>

<script src="jvscript.js"></script>

</body>
</html>
